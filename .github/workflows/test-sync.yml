name: Test Journal Sync

on:
  workflow_dispatch:

jobs:
  test-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: karpathy-llm-wiki,yoyo-evolve

      - name: Test cross-repo access
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          echo "→ Testing read access to yoyo-evolve..."
          CURRENT=$(gh api repos/yologdev/yoyo-evolve/contents/JOURNAL-llm-wiki.md 2>&1 || true)
          if echo "$CURRENT" | grep -q '"sha"'; then
            echo "  File exists — can read."
            echo "$CURRENT" | python3 -c "import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode()[:200])"
          elif echo "$CURRENT" | grep -q "Not Found"; then
            echo "  File doesn't exist yet — will create."
          else
            echo "  ERROR: $CURRENT"
            exit 1
          fi

          echo ""
          echo "→ Testing write access to yoyo-evolve..."
          TEST_CONTENT=$(echo "# Test sync $(date)" | python3 -c "import sys,base64; print(base64.b64encode(sys.stdin.buffer.read()).decode())")

          # Get current SHA if file exists
          SHA_FIELD=""
          if echo "$CURRENT" | grep -q '"sha"'; then
            SHA=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
            SHA_FIELD="\"sha\":\"$SHA\","
          fi

          RESULT=$(gh api repos/yologdev/yoyo-evolve/contents/JOURNAL-llm-wiki.md \
            -X PUT \
            --input - <<EOF 2>&1
          {"message":"test: journal sync from karpathy-llm-wiki","content":"$TEST_CONTENT",${SHA_FIELD}"branch":"main"}
          EOF
          )

          if echo "$RESULT" | grep -q '"sha"'; then
            echo "  Write SUCCESS — journal sync works!"
          else
            echo "  Write FAILED: $RESULT"
            exit 1
          fi
